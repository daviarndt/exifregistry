name: Publish to npm

# Publishes the package whenever a version tag (v1.2.3) is pushed.
#
# Auth is tokenless via npm Trusted Publishing (OIDC). No NPM_TOKEN secret is
# needed and there is no 2FA prompt: GitHub Actions proves its identity to npm
# directly. One-time setup on npmjs.com:
#   Package "exifregistry" -> Settings -> Trusted Publisher -> GitHub Actions
#   Organization or user: daviarndt
#   Repository: exifregistry
#   Workflow filename: publish.yml
# Trusted Publishing needs npm >= 11.5.1, so the workflow upgrades npm first.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing (and provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public

  # Updates the Homebrew formula in daviarndt/homebrew-tap to the new version.
  # Optional: the steps skip themselves unless a TAP_TOKEN secret (a PAT with
  # write access to the tap repo) is present. The `secrets` context is not
  # allowed in a job-level `if`, so it is mapped to `env` and checked per step.
  bump-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
    steps:
      - name: Note when skipping
        if: env.TAP_TOKEN == ''
        run: echo "TAP_TOKEN not set; skipping the Homebrew formula bump."
      - name: Compute version and checksum
        id: info
        if: env.TAP_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          for i in 1 2 3 4 5 6; do
            URL="https://registry.npmjs.org/exifregistry/-/exifregistry-$VERSION.tgz"
            if curl -fsSL "$URL" -o pkg.tgz; then break; fi
            echo "waiting for npm to serve $VERSION..."; sleep 15
          done
          echo "sha=$(sha256sum pkg.tgz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update the formula
        if: env.TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.info.outputs.version }}
          SHA: ${{ steps.info.outputs.sha }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/daviarndt/homebrew-tap.git" tap
          cd tap
          sed -i -E "s|exifregistry-[0-9.]+\.tgz|exifregistry-${VERSION}.tgz|" Formula/exifregistry.rb
          sed -i -E "s|sha256 \"[0-9a-f]+\"|sha256 \"${SHA}\"|" Formula/exifregistry.rb
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git commit -am "exifregistry ${VERSION}" && git push
